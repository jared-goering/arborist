<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arborist — Hybrid vs Linear</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
</style>
</head>
<body>
<canvas id="c" width="1920" height="1080"></canvas>
<script>

// =====================================================================
//  ARBORIST v3 — Phase-based animation with explore/prune drama
//  Each explore phase: branches appear simultaneously → evaluate → prune
// =====================================================================

const W = 1920, H = 1080;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const rand = (() => {
  let s = 42;
  return () => { s|=0; s=s+0x6D2B79F5|0; let t=Math.imul(s^s>>>15,1|s); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; };
})();

// ── LINEAR DATA ─────────────────────────────────────────────────────
const LIN_IMPS = [
  [2, 0.8436], [5, 0.8498], [9, 0.8541], [15, 0.8573],
  [22, 0.8601], [31, 0.8627], [40, 0.8651], [48, 0.8659]
];
const LIN_MAX = 50;
const LIN_DOTS = (() => {
  const dots = [], impMap = new Map(LIN_IMPS.map(([e,s],i) => [e,{s,i}]));
  let bi = 0;
  for (let e = 1; e <= LIN_MAX; e++) {
    const imp = impMap.get(e);
    if (imp) { bi = imp.i; dots.push({e, s:imp.s, kept:true}); }
    else { const b = LIN_IMPS[Math.min(bi, LIN_IMPS.length-1)][1]; dots.push({e, s: Math.max(0.828, Math.min(0.870, b + (rand()-0.62)*0.045)), kept:false}); }
  }
  return dots;
})();

// ── HYBRID TREE — explicit positions ────────────────────────────────
const NODES = {
  R:   { par:null, ph:'explore', f:0.8509, x:0.02, y:0.40 },

  // Explore 1: fan from root
  E1a: { par:'R',   ph:'explore', f:0.8553, x:0.13, y:0.28 },
  E1b: { par:'R',   ph:'explore', f:0.8481, x:0.13, y:0.52 },
  E1c: { par:'R',   ph:'explore', f:0.8421, x:0.13, y:0.12 },
  E1d: { par:'R',   ph:'explore', f:0.8392, x:0.13, y:0.66 },
  // Dead-end extensions
  D1a: { par:'E1b', ph:'explore', f:0.8465, x:0.21, y:0.58 },
  D1b: { par:'E1c', ph:'explore', f:0.8401, x:0.21, y:0.08 },
  D1c: { par:'E1d', ph:'explore', f:0.8377, x:0.21, y:0.72 },

  // Exploit 1: climb from E1a
  X1a: { par:'E1a', ph:'exploit', f:0.8614, x:0.23, y:0.28 },
  X1b: { par:'X1a', ph:'exploit', f:0.8651, x:0.31, y:0.28 },
  X1c: { par:'X1b', ph:'exploit', f:0.8671, x:0.39, y:0.28 },

  // Explore 2: fan from X1c
  E2a: { par:'X1c', ph:'explore', f:0.8688, x:0.49, y:0.20 },
  E2b: { par:'X1c', ph:'explore', f:0.8601, x:0.49, y:0.40 },
  E2c: { par:'X1c', ph:'explore', f:0.8543, x:0.49, y:0.54 },
  D2a: { par:'E2b', ph:'explore', f:0.8588, x:0.56, y:0.44 },
  D2b: { par:'E2c', ph:'explore', f:0.8521, x:0.56, y:0.59 },

  // Exploit 2: climb from E2a
  X2a: { par:'E2a', ph:'exploit', f:0.8704, x:0.57, y:0.20 },
  X2b: { par:'X2a', ph:'exploit', f:0.8723, x:0.64, y:0.20 },
  X2c: { par:'X2b', ph:'exploit', f:0.8731, x:0.71, y:0.20 },

  // Explore 3: scout from X2c
  E3a: { par:'X2c', ph:'explore', f:0.8718, x:0.79, y:0.13 },
  E3b: { par:'X2c', ph:'explore', f:0.8641, x:0.79, y:0.32 },

  // Exploit 3: final climb
  X3a: { par:'E3a', ph:'exploit', f:0.8740, x:0.86, y:0.13 },
  X3b: { par:'X3a', ph:'exploit', f:0.8748, x:0.92, y:0.13 },
  X3c: { par:'X3b', ph:'exploit', f:0.8750, x:0.97, y:0.13 },
};

const BEST_PATH = new Set(['R','E1a','X1a','X1b','X1c','E2a','X2a','X2b','X2c','E3a','X3a','X3b','X3c']);
const PRUNED = new Set(['E1b','E1c','E1d','D1a','D1b','D1c','E2b','E2c','D2a','D2b','E3b']);

// ── PHASE TIMELINE ──────────────────────────────────────────────────
// Each phase occupies a time range in [0..1] (within hybrid's portion)
// Explore phases have sub-stages: appear → evaluate → prune → pick winner
// Exploit phases: nodes appear one by one
const PHASES = [
  // Phase 0: Root appears
  { t0: 0.00, t1: 0.04, type: 'root', nodes: ['R'] },

  // Phase 1: EXPLORE 1 — branches fan out, then prune
  { t0: 0.04, t1: 0.22, type: 'explore',
    branches: ['E1a', 'E1b', 'E1c', 'E1d'],       // appear simultaneously
    extensions: ['D1a', 'D1b', 'D1c'],               // dead-end extensions appear
    winner: 'E1a',                                     // survives
    pruned: ['E1b', 'E1c', 'E1d', 'D1a', 'D1b', 'D1c'],
    // Sub-timing within phase (fractions of phase duration):
    fanOut: 0.25,       // 0-25%: branches appear
    extend: 0.42,       // 25-42%: dead ends try extending
    evaluate: 0.58,     // 42-58%: all glow, evaluating
    prune: 0.80,        // 58-80%: dead ends fade & get X'd
    // 80-100%: winner brightens
  },

  // Phase 2: EXPLOIT 1 — three nodes appear sequentially
  { t0: 0.22, t1: 0.36, type: 'exploit', nodes: ['X1a', 'X1b', 'X1c'] },

  // Phase 3: EXPLORE 2
  { t0: 0.36, t1: 0.54, type: 'explore',
    branches: ['E2a', 'E2b', 'E2c'],
    extensions: ['D2a', 'D2b'],
    winner: 'E2a',
    pruned: ['E2b', 'E2c', 'D2a', 'D2b'],
    fanOut: 0.25, extend: 0.42, evaluate: 0.58, prune: 0.80,
  },

  // Phase 4: EXPLOIT 2
  { t0: 0.54, t1: 0.68, type: 'exploit', nodes: ['X2a', 'X2b', 'X2c'] },

  // Phase 5: EXPLORE 3
  { t0: 0.68, t1: 0.84, type: 'explore',
    branches: ['E3a', 'E3b'],
    extensions: [],
    winner: 'E3a',
    pruned: ['E3b'],
    fanOut: 0.30, extend: 0.30, evaluate: 0.55, prune: 0.80,
  },

  // Phase 6: EXPLOIT 3 — final climb
  { t0: 0.84, t1: 1.00, type: 'exploit', nodes: ['X3a', 'X3b', 'X3c'] },
];

// ── COLORS ──────────────────────────────────────────────────────────
const C = {
  bg: '#0a0a0a', panel: '#0f0f0f', border: '#1a1a1a', grid: '#141414',
  green: '#4ade80', blue: '#60a5fa', orange: '#fb923c', red: '#ef4444',
  candidate: '#a78bfa',  // purple: "being evaluated" color
};

// ── PRIMITIVES ──────────────────────────────────────────────────────
function circle(x,y,r) { ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); }
function line(x1,y1,x2,y2) { ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }
function roundRect(x,y,w,h,r) { ctx.beginPath(); ctx.roundRect(x,y,w,h,r); }
function txt(s,x,y,{font,color,align='left'}={}) {
  if(font) ctx.font=font; if(color) ctx.fillStyle=color; ctx.textAlign=align; ctx.fillText(s,x,y);
}

const easeOut = t => 1-Math.pow(1-Math.min(t,1),3);
const easeIn = t => Math.pow(Math.min(t,1), 2);
const lerp = (a,b,t) => a+(b-a)*Math.min(Math.max(t,0),1);
const clamp = (v,a,b) => Math.min(Math.max(v,a),b);

// ── LAYOUT ──────────────────────────────────────────────────────────
const MARGIN = 60, GAP = 32;
const L_W = 420;
const H_W = W - MARGIN*2 - GAP - L_W;
const L_X = MARGIN, H_X = MARGIN + L_W + GAP;
const PANEL_Y = 130, PANEL_H = 680;
const PAD = { t: 52, r: 24, b: 44, l: 52 };

// Timing — LINEAR hybrid progress so each phase gets equal screen time
const HYBRID_END = 0.48;   // hybrid finishes at ~48% of animation
const LINEAR_END = 0.85;
function hybridProg(t) { return clamp(t/HYBRID_END, 0, 1); }  // LINEAR — no easing!
function linearProg(t) { return easeOut(clamp(t/LINEAR_END, 0, 1)); }

function formatTime(secs) {
  const m=Math.floor(secs/60), s=Math.round(secs%60);
  return `${m}m ${s<10?'0':''}${s}s`;
}

// ── COMPUTE NODE STATES ─────────────────────────────────────────────
// For each node at time hp (hybrid progress 0..1), compute:
//   state: 'hidden' | 'appearing' | 'candidate' | 'evaluating' | 'pruning' | 'pruned' | 'winner' | 'settled'
//   alpha: 0..1
//   glow: 0..1

function computeNodeStates(hp) {
  const states = {};

  for (const [id, nd] of Object.entries(NODES)) {
    states[id] = { state: 'hidden', alpha: 0, glow: 0, pulsePhase: 0 };
  }

  for (const phase of PHASES) {
    const phaseT = clamp((hp - phase.t0) / (phase.t1 - phase.t0), 0, 1);
    if (phaseT <= 0) continue;

    if (phase.type === 'root') {
      states['R'] = { state: 'settled', alpha: easeOut(phaseT), glow: 0.3 };
    }
    else if (phase.type === 'exploit') {
      const n = phase.nodes.length;
      phase.nodes.forEach((id, i) => {
        const nodeStart = i / n;
        // Slower alpha ramp so edge has time to draw in before node fully appears
        const nodeT = clamp((phaseT - nodeStart) * n, 0, 1);
        const alphaT = easeOut(clamp(nodeT * 1.5 - 0.2, 0, 1)); // delays slightly, then catches up
        if (nodeT > 0) {
          states[id] = { state: 'settled', alpha: nodeT, glow: nodeT > 0.5 ? 0.3 : 0, drawProg: easeOut(nodeT) };
        }
      });
    }
    else if (phase.type === 'explore') {
      const { branches, extensions, winner, pruned: prunedList, fanOut, extend, evaluate, prune } = phase;

      // Each sub-phase is SELF-CONTAINED — sets ALL node states it needs
      // (not dependent on earlier sub-phases having run)

      if (phaseT < fanOut) {
        // Branches appear simultaneously
        const subT = phaseT / fanOut;
        branches.forEach(id => {
          states[id] = { state: 'candidate', alpha: easeOut(subT), glow: 0.2 * subT, pulsePhase: 0 };
        });
      }
      else if (phaseT < extend) {
        // Branches fully visible, extensions growing
        const subT = (phaseT - fanOut) / (extend - fanOut);
        branches.forEach(id => {
          states[id] = { state: 'candidate', alpha: 1, glow: 0.3, pulsePhase: 0 };
        });
        extensions.forEach(id => {
          states[id] = { state: 'candidate', alpha: easeOut(subT), glow: 0.15 * subT, pulsePhase: 0 };
        });
      }
      else if (phaseT < evaluate) {
        // ALL nodes glow purple — "evaluating"
        const subT = (phaseT - extend) / (evaluate - extend);
        const allNodes = [...branches, ...extensions];
        allNodes.forEach(id => {
          const pulse = 0.5 + 0.5 * Math.sin(subT * Math.PI * 4 + (NODES[id].y * 10));
          states[id] = { state: 'evaluating', alpha: 1, glow: 0.4 + 0.3 * pulse, pulsePhase: subT };
        });
      }
      else if (phaseT < prune) {
        // Winner brightens, dead ends fade with X
        const subT = (phaseT - evaluate) / (prune - evaluate);
        states[winner] = { state: 'winner', alpha: 1, glow: 0.5 + 0.3 * easeOut(subT) };
        prunedList.forEach(id => {
          const fadeT = easeIn(subT);
          states[id] = { state: 'pruning', alpha: lerp(1, 0.25, fadeT), glow: lerp(0.3, 0, fadeT), pruneT: fadeT };
        });
      }
      else {
        // Winner settled, dead ends permanently pruned
        const subT = (phaseT - prune) / (1 - prune);
        states[winner] = { state: 'settled', alpha: 1, glow: lerp(0.8, 0.3, easeOut(subT)) };
        prunedList.forEach(id => {
          states[id] = { state: 'pruned', alpha: 0.2, glow: 0, pruneT: 1 };
        });
      }
    }
  }

  return states;
}

// ── RENDER FRAME ────────────────────────────────────────────────────
function renderFrame(t) {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, W, H);

  // Background glow
  const bg = ctx.createRadialGradient(H_X + H_W*0.7, PANEL_Y + PANEL_H*0.25, 0, H_X + H_W*0.6, PANEL_Y + PANEL_H*0.3, 600);
  bg.addColorStop(0, 'rgba(34,197,94,0.015)');
  bg.addColorStop(1, 'transparent');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Title
  const tg = ctx.createLinearGradient(W/2-180, 0, W/2+180, 0);
  tg.addColorStop(0, '#22c55e'); tg.addColorStop(0.5, C.green); tg.addColorStop(1, '#86efac');
  txt('arborist', W/2, 68, { font: '900 58px Inter,sans-serif', color: tg, align: 'center' });
  txt('Forest Cover Type — 50 experiment budget', W/2, 98,
    { font: '400 17px Inter,sans-serif', color: '#3a3a3a', align: 'center' });

  const hDone = t >= HYBRID_END;
  const lDone = t >= LINEAR_END;

  // Panels
  ctx.fillStyle = C.panel; ctx.strokeStyle = C.border; ctx.lineWidth = 1;
  roundRect(L_X, PANEL_Y, L_W, PANEL_H, 14); ctx.fill(); ctx.stroke();
  ctx.fillStyle = C.panel; ctx.strokeStyle = C.border;
  roundRect(H_X, PANEL_Y, H_W, PANEL_H, 14); ctx.fill(); ctx.stroke();

  if (hDone) {
    const fade = clamp((t - HYBRID_END) / 0.08, 0, 1);
    ctx.save(); ctx.globalAlpha = fade * 0.6;
    ctx.shadowColor = 'rgba(74,222,128,0.2)'; ctx.shadowBlur = 50;
    ctx.strokeStyle = 'rgba(74,222,128,0.25)'; ctx.lineWidth = 2;
    roundRect(H_X, PANEL_Y, H_W, PANEL_H, 14); ctx.stroke();
    ctx.shadowBlur = 0; ctx.restore();
  }

  // Headers
  txt('LINEAR + LLM', L_X + 20, PANEL_Y + 34, { font: '600 13px Inter,sans-serif', color: '#555' });
  drawBadge(L_X + L_W - 108, PANEL_Y + 18, 'autoresearch', '#666', 'rgba(161,161,170,0.06)');
  txt('HYBRID SEARCH', H_X + 24, PANEL_Y + 34, { font: '700 14px Inter,sans-serif', color: C.green });
  drawBadge(H_X + H_W - 88, PANEL_Y + 18, 'arborist', C.green, 'rgba(74,222,128,0.06)');

  // Content
  const lp = linearProg(t);
  const hp = hybridProg(t);
  const lStats = drawLinear(lp, t);
  const hStats = drawHybrid(hp, t);

  // Timers
  txt('⏱ ' + formatTime(lp * 2454), L_X + 20, PANEL_Y + PANEL_H - 16,
    { font: '500 11px "JetBrains Mono",monospace', color: lDone ? '#333' : '#555' });
  txt('⏱ ' + formatTime(hp * 1186), H_X + 24, PANEL_Y + PANEL_H - 16,
    { font: '500 11px "JetBrains Mono",monospace', color: hDone ? '#444' : C.green });

  // Done badge
  if (hDone) {
    const fade = clamp((t - HYBRID_END) / 0.06, 0, 1);
    ctx.save(); ctx.globalAlpha = fade;
    ctx.fillStyle = 'rgba(34,197,94,0.12)';
    roundRect(H_X + H_W - 96, PANEL_Y + PANEL_H - 28, 76, 22, 5); ctx.fill();
    txt('✓ DONE', H_X + H_W - 84, PANEL_Y + PANEL_H - 13,
      { font: '600 11px Inter,sans-serif', color: C.green });
    ctx.restore();
  }

  // Still searching
  if (hDone && !lDone) {
    const pulse = 0.35 + 0.25 * Math.sin(t * 10);
    ctx.save(); ctx.globalAlpha = pulse;
    txt('still searching...', L_X + L_W/2, PANEL_Y + PANEL_H - 44,
      { font: '500 11px Inter,sans-serif', color: '#444', align: 'center' });
    ctx.restore();
  }

  // Stats
  const sy = PANEL_Y + PANEL_H + 16;
  txt(lStats.best.toFixed(4), L_X + 20, sy + 18, { font: '700 24px "JetBrains Mono",monospace', color: '#777' });
  txt('Best F1', L_X + 20, sy + 34, { font: '500 11px Inter,sans-serif', color: '#444' });
  txt(lStats.exp + ' exp · ' + lStats.imps + ' improvements', L_X + 20, sy + 56,
    { font: '500 12px Inter,sans-serif', color: '#444' });
  if (lStats.plateau > 0) {
    txt(lStats.plateau + ' wasted (no gain)', L_X + 20, sy + 74,
      { font: '500 12px Inter,sans-serif', color: 'rgba(239,68,68,0.5)' });
  }

  txt(hStats.best.toFixed(4), H_X + 24, sy + 18, { font: '700 28px "JetBrains Mono",monospace', color: C.green });
  txt('Best F1', H_X + 24, sy + 36, { font: '500 11px Inter,sans-serif', color: '#555' });

  if (hDone) {
    const fade = clamp((t - HYBRID_END) / 0.12, 0, 1);
    ctx.save(); ctx.globalAlpha = fade;
    const sx = H_X + 200;
    txt('+1.1%', sx, sy + 18, { font: '700 22px "JetBrains Mono",monospace', color: C.green });
    txt('vs linear', sx + 76, sy + 18, { font: '400 15px Inter,sans-serif', color: '#555' });
    txt('2–10×', sx + 190, sy + 18, { font: '700 22px "JetBrains Mono",monospace', color: C.green });
    txt('faster', sx + 264, sy + 18, { font: '400 15px Inter,sans-serif', color: '#555' });
    txt(hStats.abandoned + ' dead ends pruned  ·  Best at experiment ' + hStats.bestAt + '  ·  3 explore/exploit cycles',
      sx, sy + 42, { font: '500 12px Inter,sans-serif', color: '#555' });
    ctx.restore();
  }

  // Legend
  const ly = H - 28;
  const items = [
    [C.green,     'Winning path'],
    [C.blue,      'Explore (UCB branching)'],
    [C.candidate, 'Evaluating'],
    [C.orange,    'Exploit (hill climb)'],
    ['#555',      'Pruned (dead end)'],
  ];
  const legW = 720, legStart = W/2 - legW/2;
  items.forEach(([c, l], i) => {
    const x = legStart + i * (legW / items.length);
    circle(x + 4, ly, 4); ctx.fillStyle = c; ctx.fill();
    txt(l, x + 14, ly + 4, { font: '12px Inter,sans-serif', color: '#555' });
  });
}

// ── LINEAR PANEL ────────────────────────────────────────────────────
function drawLinear(p, t) {
  const ox = L_X + PAD.l, oy = PANEL_Y + PAD.t;
  const cw = L_W - PAD.l - PAD.r, ch = PANEL_H - PAD.t - PAD.b;
  const yMin = 0.82, yMax = 0.895;
  const toX = v => ox + (v / LIN_MAX) * cw;
  const toY = v => oy + ch - ((v - yMin) / (yMax - yMin)) * ch;

  ctx.strokeStyle = C.grid; ctx.lineWidth = 1;
  for (let s = yMin; s <= yMax + 0.001; s += 0.02) {
    line(ox, toY(s), ox + cw, toY(s));
    txt(s.toFixed(2), ox - 8, toY(s) + 4, { font: '10px "JetBrains Mono",monospace', color: '#282828', align: 'right' });
  }
  for (let e = 0; e <= 50; e += 25) {
    txt(String(e), toX(e), oy + ch + 16, { font: '10px "JetBrains Mono",monospace', color: '#282828', align: 'center' });
  }

  const vis = p * LIN_MAX;
  const imps = LIN_IMPS.filter(([e]) => e <= vis);

  for (const d of LIN_DOTS) {
    if (d.e > vis || d.kept) continue;
    circle(toX(d.e), toY(d.s), 2);
    ctx.fillStyle = `rgba(161,161,170,${clamp((vis-d.e)/4,0,1) * 0.12})`; ctx.fill();
  }

  if (imps.length) {
    ctx.beginPath(); ctx.strokeStyle = 'rgba(96,165,250,0.6)'; ctx.lineWidth = 2;
    imps.forEach(([e, s], i) => {
      const next = i < imps.length - 1 ? imps[i+1][0] : Math.min(vis, LIN_MAX);
      i === 0 ? ctx.moveTo(toX(e), toY(s)) : ctx.lineTo(toX(e), toY(s));
      ctx.lineTo(toX(next), toY(s));
    });
    ctx.stroke();
    for (const [e, s] of imps) {
      const age = easeOut(clamp((vis-e)/3,0,1));
      if (age > 0.3) { circle(toX(e), toY(s), 3.5*age); ctx.fillStyle = `rgba(96,165,250,${0.6*age})`; ctx.fill(); }
    }
  }

  let plateauCount = 0;
  if (vis > 48) {
    plateauCount = Math.round(vis - 48);
    const fade = clamp((vis-44)/6,0,1);
    const px = toX(48);
    ctx.save(); ctx.globalAlpha = fade;
    ctx.fillStyle = 'rgba(239,68,68,0.03)';
    ctx.fillRect(px, oy, toX(Math.min(vis,LIN_MAX))-px, ch);
    ctx.setLineDash([4,4]); ctx.strokeStyle = 'rgba(239,68,68,0.25)'; ctx.lineWidth = 1;
    line(px, oy, px, oy+ch); ctx.setLineDash([]);
    if (vis >= 49) {
      const pulse = 0.4+0.3*Math.sin(t*8);
      ctx.globalAlpha = fade*pulse;
      txt('STUCK', toX(49), oy+ch/2-4, { font: '800 18px Inter,sans-serif', color: 'rgba(239,68,68,0.35)', align: 'center' });
      ctx.globalAlpha = fade*0.6;
      txt(plateauCount + ' exp wasted', toX(49), oy+ch/2+16, { font: '500 10px Inter,sans-serif', color: 'rgba(239,68,68,0.3)', align: 'center' });
    }
    ctx.restore();
  }

  return { best: imps.length ? imps[imps.length-1][1] : 0.82, exp: Math.round(vis), imps: imps.length, plateau: plateauCount };
}

// ── HYBRID PANEL (HERO) ─────────────────────────────────────────────
function drawHybrid(hp, globalT) {
  const ox = H_X + PAD.l + 10, oy = PANEL_Y + PAD.t;
  const cw = H_W - PAD.l - PAD.r - 20, ch = PANEL_H - PAD.t - PAD.b;

  function pos(nd) { return { x: ox + nd.x * cw, y: oy + nd.y * ch }; }

  const states = computeNodeStates(hp);

  let best = 0, bestId = null, bestAt = 0, abandoned = 0;
  let visCount = 0;

  // Count visible nodes and stats
  for (const [id, nd] of Object.entries(NODES)) {
    const st = states[id];
    if (st.state !== 'hidden') {
      visCount++;
      if (nd.f > best) { best = nd.f; bestId = id; bestAt = visCount; }
      if (st.state === 'pruned' || st.state === 'pruning') abandoned++;
    }
  }

  // === Draw edges with progressive animation ===
  // Edges "grow" from parent toward child based on node's appearance progress
  for (const [id, nd] of Object.entries(NODES)) {
    if (!nd.par) continue;
    const st = states[id];
    if (st.state === 'hidden') continue;

    const from = pos(NODES[nd.par]);
    const to = pos(nd);
    const parSt = states[nd.par];

    // Edge draw progress: how far along the edge is drawn (0 = nothing, 1 = full)
    // Uses alpha as proxy for appearance progress, but with a faster ramp
    const drawProg = clamp(st.alpha * 1.3, 0, 1);

    ctx.save();
    ctx.globalAlpha = st.alpha * (parSt.alpha || 1);

    const isPruned = st.state === 'pruned' || st.state === 'pruning';
    const isBP = BEST_PATH.has(id) && BEST_PATH.has(nd.par);
    const isEval = st.state === 'evaluating';
    const isCandidate = st.state === 'candidate';

    if (isPruned) {
      ctx.strokeStyle = 'rgba(100,100,100,0.12)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 5]);
    } else if (isEval || isCandidate) {
      ctx.strokeStyle = `rgba(167,139,250,${0.3 + st.glow * 0.4})`;
      ctx.lineWidth = 2;
    } else if (isBP && nd.ph === 'exploit') {
      ctx.strokeStyle = 'rgba(251,146,60,0.65)';
      ctx.lineWidth = 3;
    } else if (isBP) {
      ctx.strokeStyle = 'rgba(74,222,128,0.45)';
      ctx.lineWidth = 2.5;
    } else {
      ctx.strokeStyle = 'rgba(96,165,250,0.15)';
      ctx.lineWidth = 1;
    }

    // Draw edge progressively using sub-path
    if (nd.ph === 'exploit' && !isPruned && !isCandidate && !isEval) {
      // Straight line — interpolate endpoint
      const ex = lerp(from.x, to.x, drawProg);
      const ey = lerp(from.y, to.y, drawProg);
      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(ex, ey);
    } else {
      // Bezier curve — split at drawProg using de Casteljau
      const mx = (from.x + to.x) / 2;
      // Control points: P0=from, P1=(mx, from.y), P2=(mx, to.y), P3=to
      const p = drawProg;
      // de Casteljau for cubic bezier at parameter p
      const p0 = {x: from.x, y: from.y};
      const p1 = {x: mx, y: from.y};
      const p2 = {x: mx, y: to.y};
      const p3 = {x: to.x, y: to.y};

      const q0 = {x: lerp(p0.x,p1.x,p), y: lerp(p0.y,p1.y,p)};
      const q1 = {x: lerp(p1.x,p2.x,p), y: lerp(p1.y,p2.y,p)};
      const q2 = {x: lerp(p2.x,p3.x,p), y: lerp(p2.y,p3.y,p)};

      const r0 = {x: lerp(q0.x,q1.x,p), y: lerp(q0.y,q1.y,p)};
      const r1 = {x: lerp(q1.x,q2.x,p), y: lerp(q1.y,q2.y,p)};

      const s0 = {x: lerp(r0.x,r1.x,p), y: lerp(r0.y,r1.y,p)};

      // Draw the first sub-curve (from start to parameter p)
      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      ctx.bezierCurveTo(q0.x, q0.y, r0.x, r0.y, s0.x, s0.y);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // Leading dot on growing edges (only while still drawing in)
    if (drawProg < 0.95 && drawProg > 0.05 && !isPruned) {
      let tipX, tipY;
      if (nd.ph === 'exploit' && !isCandidate && !isEval) {
        tipX = lerp(from.x, to.x, drawProg);
        tipY = lerp(from.y, to.y, drawProg);
      } else {
        const mx = (from.x + to.x) / 2;
        const p = drawProg;
        const q0x = lerp(from.x,mx,p), q0y = lerp(from.y,from.y,p);
        const q1x = lerp(mx,mx,p), q1y = lerp(from.y,to.y,p);
        const q2x = lerp(mx,to.x,p), q2y = lerp(to.y,to.y,p);
        const r0x = lerp(q0x,q1x,p), r0y = lerp(q0y,q1y,p);
        const r1x = lerp(q1x,q2x,p), r1y = lerp(q1y,q2y,p);
        tipX = lerp(r0x,r1x,p); tipY = lerp(r0y,r1y,p);
      }
      // Small bright dot at the tip
      const tipColor = isEval || isCandidate ? C.candidate : (isBP && nd.ph === 'exploit' ? C.orange : (isBP ? C.green : C.blue));
      circle(tipX, tipY, 3);
      ctx.fillStyle = tipColor; ctx.fill();
    }

    ctx.restore();
  }

  // === Draw nodes ===
  for (const [id, nd] of Object.entries(NODES)) {
    const st = states[id];
    if (st.state === 'hidden') continue;

    const {x, y} = pos(nd);
    ctx.save(); ctx.globalAlpha = st.alpha;

    const isBP = BEST_PATH.has(id);

    if (st.state === 'pruned' || st.state === 'pruning') {
      // Gray dead node — larger for visibility
      circle(x, y, 6);
      ctx.fillStyle = `rgba(80,80,80,${0.2 * st.alpha})`; ctx.fill();
      ctx.strokeStyle = `rgba(80,80,80,${0.15 * st.alpha})`; ctx.lineWidth = 1;
      ctx.stroke();

      // Red X — big, bold, dramatic
      const xAlpha = st.pruneT || 1;
      if (xAlpha > 0.1) {
        ctx.globalAlpha = st.alpha * xAlpha;

        // Red glow behind X
        const xGlow = ctx.createRadialGradient(x, y, 0, x, y, 14 * xAlpha);
        xGlow.addColorStop(0, `rgba(239,68,68,${0.15 * xAlpha})`);
        xGlow.addColorStop(1, 'rgba(0,0,0,0)');
        circle(x, y, 14 * xAlpha); ctx.fillStyle = xGlow; ctx.fill();

        ctx.strokeStyle = `rgba(239,68,68,${0.6 * xAlpha})`; ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        const s = 6;
        line(x-s, y-s, x+s, y+s);
        line(x+s, y-s, x-s, y+s);
        ctx.lineCap = 'butt';
      }
    }
    else if (st.state === 'evaluating') {
      // Purple pulsing node — "thinking"
      const gr = ctx.createRadialGradient(x, y, 0, x, y, 16);
      gr.addColorStop(0, `rgba(167,139,250,${0.3 * st.glow})`);
      gr.addColorStop(1, 'rgba(0,0,0,0)');
      circle(x, y, 16); ctx.fillStyle = gr; ctx.fill();

      circle(x, y, 6);
      ctx.fillStyle = `rgba(167,139,250,${0.7 + 0.3 * st.glow})`; ctx.fill();

      // F1 score during evaluation
      txt(nd.f.toFixed(4), x, y - 14,
        { font: '600 10px "JetBrains Mono",monospace', color: `rgba(167,139,250,${0.6 + 0.4 * st.glow})`, align: 'center' });
    }
    else if (st.state === 'candidate') {
      // Blue-ish candidate, just appeared
      const gr = ctx.createRadialGradient(x, y, 0, x, y, 12);
      gr.addColorStop(0, `rgba(96,165,250,${0.15 * st.alpha})`);
      gr.addColorStop(1, 'rgba(0,0,0,0)');
      circle(x, y, 12); ctx.fillStyle = gr; ctx.fill();

      circle(x, y, 5);
      ctx.fillStyle = `rgba(96,165,250,${0.6 * st.alpha})`; ctx.fill();
    }
    else if (st.state === 'winner') {
      // Bright green winner with glow
      const gr = ctx.createRadialGradient(x, y, 0, x, y, 20 * st.glow);
      gr.addColorStop(0, `rgba(74,222,128,${0.4 * st.glow})`);
      gr.addColorStop(1, 'rgba(0,0,0,0)');
      circle(x, y, 20 * st.glow); ctx.fillStyle = gr; ctx.fill();

      circle(x, y, 7);
      ctx.fillStyle = C.green; ctx.fill();

      txt(nd.f.toFixed(4), x, y - 16,
        { font: '700 11px "JetBrains Mono",monospace', color: C.green, align: 'center' });
    }
    else if (st.state === 'settled') {
      // Settled node on best path
      const isExploit = nd.ph === 'exploit';
      const nodeColor = isBP ? (isExploit ? C.orange : C.green) : '#555';
      const isFinal = id === 'X3c' && best >= 0.8748;

      if (st.glow > 0.1) {
        const gr = ctx.createRadialGradient(x, y, 0, x, y, (isFinal ? 24 : 12) * st.glow);
        const gc = isFinal ? 'rgba(74,222,128,' : (isExploit ? 'rgba(251,146,60,' : 'rgba(74,222,128,');
        gr.addColorStop(0, gc + (0.3 * st.glow) + ')');
        gr.addColorStop(1, 'rgba(0,0,0,0)');
        circle(x, y, (isFinal ? 24 : 12) * st.glow); ctx.fillStyle = gr; ctx.fill();
      }

      const r = isFinal ? 9 : (id === 'R' ? 7 : 5.5);
      circle(x, y, r);
      ctx.fillStyle = nodeColor; ctx.fill();

      // Labels on key nodes
      if ((isFinal || id === 'R' || id === 'X1c' || id === 'X2c' || id === 'E2a') && st.alpha > 0.7) {
        txt(nd.f.toFixed(4), x, y - r - 8,
          { font: '700 11px "JetBrains Mono",monospace', color: nodeColor, align: 'center' });
      }
    }

    ctx.restore();
  }

  // === Celebration on final node ===
  if (states['X3c'] && states['X3c'].state === 'settled' && best >= 0.8748) {
    const {x, y} = pos(NODES['X3c']);
    const pulse = 0.7 + 0.3 * Math.sin(globalT * 14);

    const gr = ctx.createRadialGradient(x, y, 0, x, y, 50 * pulse);
    gr.addColorStop(0, 'rgba(74,222,128,0.45)');
    gr.addColorStop(0.35, 'rgba(74,222,128,0.12)');
    gr.addColorStop(1, 'rgba(74,222,128,0)');
    circle(x, y, 50 * pulse); ctx.fillStyle = gr; ctx.fill();

    circle(x, y, 10);
    ctx.fillStyle = C.green; ctx.fill();

    ctx.save();
    ctx.shadowColor = C.green; ctx.shadowBlur = 14;
    txt('0.8750', x, y - 22,
      { font: '800 16px "JetBrains Mono",monospace', color: C.green, align: 'center' });
    ctx.restore();
  }

  // === Phase labels ===
  const phaseAnnotations = [
    { t0: 0.04, t1: 0.22, label: 'EXPLORE', x: 0.13, y: 0.82, color: C.blue },
    { t0: 0.22, t1: 0.36, label: 'EXPLOIT', x: 0.31, y: 0.82, color: C.orange },
    { t0: 0.36, t1: 0.54, label: 'EXPLORE', x: 0.49, y: 0.82, color: C.blue },
    { t0: 0.54, t1: 0.68, label: 'EXPLOIT', x: 0.64, y: 0.82, color: C.orange },
    { t0: 0.68, t1: 0.84, label: 'EXPLORE', x: 0.79, y: 0.82, color: C.blue },
    { t0: 0.84, t1: 1.00, label: 'EXPLOIT', x: 0.92, y: 0.82, color: C.orange },
  ];

  phaseAnnotations.forEach(a => {
    const vis = clamp((hp - a.t0) / 0.04, 0, 1);
    if (vis <= 0) return;
    const active = hp >= a.t0 && hp < a.t1;
    ctx.save(); ctx.globalAlpha = active ? 0.7 : vis * 0.35;
    txt(a.label, ox + a.x * cw, oy + a.y * ch,
      { font: (active ? '700' : '600') + ' 10px Inter,sans-serif', color: a.color, align: 'center' });
    ctx.restore();
  });

  // === "evaluating..." annotation during explore evaluation sub-phase ===
  for (const phase of PHASES) {
    if (phase.type !== 'explore') continue;
    const phaseT = clamp((hp - phase.t0) / (phase.t1 - phase.t0), 0, 1);
    if (phaseT >= phase.extend && phaseT < phase.evaluate) {
      // Show "evaluating..." label
      const midX = ox + (NODES[phase.branches[0]].x + 0.04) * cw;
      const topY = oy + 0.04 * ch;
      const pulse = 0.5 + 0.4 * Math.sin(globalT * 12);
      ctx.save(); ctx.globalAlpha = pulse;
      txt('evaluating...', midX, topY,
        { font: '500 11px Inter,sans-serif', color: C.candidate, align: 'center' });
      ctx.restore();
    }
    // "pruning" annotation
    if (phaseT >= phase.evaluate && phaseT < phase.prune) {
      const midX = ox + (NODES[phase.branches[0]].x + 0.04) * cw;
      const topY = oy + 0.04 * ch;
      const subT = (phaseT - phase.evaluate) / (phase.prune - phase.evaluate);
      ctx.save(); ctx.globalAlpha = 0.5 * (1 - subT);
      txt('pruning dead ends', midX, topY,
        { font: '500 11px Inter,sans-serif', color: C.red, align: 'center' });
      ctx.restore();
    }
  }

  return { best, exp: visCount, abandoned, bestAt };
}

// ── HELPERS ─────────────────────────────────────────────────────────
function drawBadge(x, y, label, color, bg) {
  ctx.font = '500 11px "JetBrains Mono",monospace';
  const w = ctx.measureText(label).width + 16;
  ctx.fillStyle = bg; roundRect(x, y, w, 22, 4); ctx.fill();
  txt(label, x+8, y+15, { color });
}

window.renderFrame = renderFrame;
renderFrame(0);

</script>
</body>
