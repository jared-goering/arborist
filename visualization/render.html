<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arborist — Tree Search vs Linear</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
</style>
</head>
<body>
<canvas id="c" width="1920" height="1080"></canvas>
<script>

// — Data —————————————————————————————————————————————————————

const IMPROVEMENTS = [
  [1, 0.2312], [3, 0.2445], [4, 0.3185], [6, 0.3267], [7, 0.3274],
  [8, 0.3540], [13, 0.3595], [41, 0.3612], [66, 0.3632],
];

const TREE = [
  ['006f', null,  0, 0.3319], ['9ab5', '006f', 1, 0.3349], ['a151', '006f', 1, 0.2862],
  ['f1da', '9ab5', 2, 0.3377], ['d186', '9ab5', 2, 0.3037], ['9fc3', 'a151', 2, 0.3002],
  ['74e6', 'a151', 2, 0.3409], ['e8a3', 'd186', 3, 0.3277], ['c4d5', 'f1da', 3, 0.3320],
  ['a1b2', 'f1da', 3, 0.3320], ['9053', '74e6', 3, 0.3385], ['bd9c', '74e6', 3, 0.3321],
  ['1a2b', '9053', 4, 0.3012], ['5e6f', '9053', 4, 0.3565], ['2de3', '9053', 4, 0.3450],
  ['c2d3', 'bd9c', 4, 0.3427], ['82c3', 'bd9c', 4, 0.2834], ['f6a7', '5e6f', 5, 0.3230],
  ['d0e1', '5e6f', 5, 0.3779], ['b4c5', '2de3', 5, 0.3145], ['a8b9', '2de3', 5, 0.3690],
  ['e2f3', 'c2d3', 5, 0.3520], ['c6d7', 'c2d3', 5, 0.3340],
];

// — Colors ———————————————————————————————————————————————————

const C = {
  bg: '#0a0a0a', panel: '#111111', border: '#1f1f1f', grid: '#1a1a1a',
  label: '#3a3a3a', muted: '#525252', gray: '#a1a1aa',
  green: '#4ade80', blue: '#60a5fa', red: 'rgba(239,68,68,',
};

// — Seeded RNG + pre-generate scatter ————————————————————————

const rand = (() => {
  let s = 42;
  return () => { s |= 0; s = s + 0x6D2B79F5 | 0; let t = Math.imul(s ^ s >>> 15, 1 | s); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; };
})();

const LINEAR_DOTS = (() => {
  const dots = [], impMap = new Map(IMPROVEMENTS.map(([e, s], i) => [e, { s, i }]));
  let bi = 0;
  for (let e = 1; e <= 100; e++) {
    const imp = impMap.get(e);
    if (imp) { bi = imp.i; dots.push({ e, s: imp.s, kept: true }); }
    else { const b = IMPROVEMENTS[bi][1]; dots.push({ e, s: Math.max(0.21, Math.min(0.39, b + (rand() - 0.7) * 0.08)), kept: false }); }
  }
  return dots;
})();

// — Canvas + primitives ——————————————————————————————————————

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1920, H = 1080;

const circle = (x, y, r) => { ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); };
const line = (x1, y1, x2, y2) => { ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke(); };
const roundRect = (x, y, w, h, r) => { ctx.beginPath(); ctx.roundRect(x, y, w, h, r); };

function text(str, x, y, { font, color, align = 'left' } = {}) {
  if (font) ctx.font = font;
  if (color) ctx.fillStyle = color;
  ctx.textAlign = align;
  ctx.fillText(str, x, y);
}

// — Easing ———————————————————————————————————————————————————

const ease = t => t < 1 ? 1 - Math.pow(1 - t, 3) : 1;             // ease-out cubic
const lerp = (a, b, t) => a + (b - a) * Math.min(Math.max(t, 0), 1);

// — Chart coordinate system ——————————————————————————————————

function makeChart(ox, oy, w, h, xRange, yRange) {
  const [xMin, xMax] = xRange, [yMin, yMax] = yRange;
  return {
    ox, oy, w, h,
    x: v => ox + ((v - xMin) / (xMax - xMin)) * w,
    y: v => oy + h - ((v - yMin) / (yMax - yMin)) * h,
    drawGrid(yStep, xLabels, xAxisLabel) {
      ctx.strokeStyle = C.grid; ctx.lineWidth = 1;
      for (let s = yMin; s <= yMax + 0.001; s += yStep) line(this.ox, this.y(s), this.ox + this.w, this.y(s));
      const mono = '12px "JetBrains Mono", monospace';
      for (let s = yMin; s <= yMax + 0.001; s += yStep) text(s.toFixed(2), this.ox - 10, this.y(s) + 4, { font: mono, color: C.label, align: 'right' });
      xLabels.forEach(([v, l]) => text(l, this.x(v), oy + h + 20, { font: mono, color: C.label, align: 'center' }));
      text(xAxisLabel, ox + w / 2, oy + h + 38, { font: '12px Inter, sans-serif', color: C.label, align: 'center' });
    },
  };
}

// — Layout ———————————————————————————————————————————————————

const PW = 820, PH = 540, PY = 150, GAP = 40;
const PAD = { t: 55, r: 24, b: 55, l: 60 };
const LEFT = (W - PW * 2 - GAP) / 2, RIGHT = LEFT + PW + GAP;
const CW = PW - PAD.l - PAD.r, CH = PH - PAD.t - PAD.b;

// — Timing ———————————————————————————————————————————————————
// t is 0..1 normalized progress
// Tree finishes at t=0.35, linear finishes at t=0.70, rest is hold
// This makes tree visibly faster

const TREE_END = 0.40;   // tree done at 40% of animation
const LINEAR_END = 0.75; // linear done at 75%

function treeProgress(t) { return ease(Math.min(t / TREE_END, 1)); }
function linearProgress(t) { return ease(Math.min(t / LINEAR_END, 1)); }

// — Frame renderer ———————————————————————————————————————————

function renderFrame(t) {
  // t: 0..1 normalized

  // Background
  ctx.fillStyle = C.bg; ctx.fillRect(0, 0, W, H);
  const bg = ctx.createRadialGradient(W * 0.3, H * 0.2, 0, W * 0.3, H * 0.2, W * 0.5);
  bg.addColorStop(0, 'rgba(34,197,94,0.03)'); bg.addColorStop(1, 'transparent');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Title
  const tg = ctx.createLinearGradient(W / 2 - 150, 0, W / 2 + 150, 0);
  tg.addColorStop(0, '#22c55e'); tg.addColorStop(0.5, C.green); tg.addColorStop(1, '#86efac');
  text('arborist', W / 2, 80, { font: '800 72px Inter, sans-serif', color: tg, align: 'center' });
  text('Tree search for hyperparameter optimization', W / 2, 115, { font: '400 22px Inter, sans-serif', color: '#737373', align: 'center' });

  // Panels
  for (const px of [LEFT, RIGHT]) {
    ctx.fillStyle = C.panel; ctx.strokeStyle = C.border; ctx.lineWidth = 1;
    roundRect(px, PY, PW, PH, 14); ctx.fill(); ctx.stroke();
  }

  // Headers
  text('LINEAR HILL CLIMBING', LEFT + 28, PY + 35, { font: '600 15px Inter', color: '#a3a3a3' });
  text('TREE SEARCH', RIGHT + 28, PY + 35, { font: '600 15px Inter', color: '#a3a3a3' });
  drawBadge(LEFT + PW - 130, PY + 22, 'autoresearch', C.gray, 'rgba(161,161,170,0.1)');
  drawBadge(RIGHT + PW - 100, PY + 22, 'arborist', C.green, 'rgba(34,197,94,0.1)');

  // VS pill
  circle(W / 2, PY + PH / 2, 28);
  ctx.fillStyle = '#1a1a1a'; ctx.fill(); ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 1; ctx.stroke();
  text('VS', W / 2, PY + PH / 2 + 5, { font: '700 14px Inter', color: C.muted, align: 'center' });

  // Charts
  const lp = linearProgress(t);
  const tp = treeProgress(t);
  const linearStats = drawLinear(lp, t);
  const treeStats = drawTree(tp, t);

  // Timer badges (simulated wall-clock: linear=45min, tree=2.8min)
  const linearTime = lp * 45;
  const treeTime = tp * 2.8;
  const treeDone = t >= TREE_END;
  const linearDone = t >= LINEAR_END;

  drawTimer(LEFT + 28, PY + PH - 28, formatTime(linearTime), linearDone);
  drawTimer(RIGHT + 28, PY + PH - 28, formatTime(treeTime), treeDone);

  // "DONE" flash on tree when it finishes first
  if (treeDone && !linearDone) {
    const flash = Math.min((t - TREE_END) / 0.05, 1);  // fade in over 5% of animation
    ctx.save();
    ctx.globalAlpha = flash;
    // Green glow around tree panel
    ctx.shadowColor = 'rgba(74,222,128,0.15)';
    ctx.shadowBlur = 30;
    ctx.strokeStyle = 'rgba(74,222,128,0.3)';
    ctx.lineWidth = 2;
    roundRect(RIGHT, PY, PW, PH, 14);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // DONE badge
    const dx = RIGHT + PW - 80, dy = PY + PH - 30;
    ctx.fillStyle = 'rgba(34,197,94,0.15)';
    roundRect(dx, dy, 60, 24, 5); ctx.fill();
    text('✓ DONE', dx + 8, dy + 16, { font: '600 11px Inter', color: C.green });
    ctx.restore();
  }

  // Stats row
  const sy = PY + PH + 20;
  drawStatRow(LEFT, sy, [
    [linearStats.best.toFixed(4), 'BEST F1', C.gray],
    [String(linearStats.exp), 'EXPERIMENTS', C.gray],
    [String(linearStats.imps), 'IMPROVEMENTS', C.gray],
  ]);
  drawStatRow(RIGHT, sy, [
    [treeStats.best.toFixed(4), 'BEST F1', C.green],
    [String(treeStats.nodes), 'EXPERIMENTS', C.green],
    [String(treeStats.branches), 'BRANCHES', C.blue],
  ]);

  // Speed comparison callout (appears after tree is done)
  if (treeDone) {
    const fade = Math.min((t - TREE_END) / 0.08, 1);
    ctx.save();
    ctx.globalAlpha = fade;

    // "16× faster" between the stat rows
    const mx = W / 2, my = sy + 8;
    ctx.fillStyle = 'rgba(34,197,94,0.08)';
    roundRect(mx - 50, my - 16, 100, 28, 8); ctx.fill();
    text('16× faster', mx, my + 2, { font: '700 14px "JetBrains Mono", monospace', color: C.green, align: 'center' });

    ctx.restore();
  }

  // Footer
  const fy = sy + 80;
  text('Linear search gets trapped in local optima after just 66 experiments.', W / 2, fy, { font: '400 17px Inter', color: '#404040', align: 'center' });
  text('Tree search branches into multiple directions using UCB, finding better solutions with fewer experiments.', W / 2, fy + 28, { font: '400 17px Inter', color: '#404040', align: 'center' });

  drawLegend(W / 2, fy + 70);
}

// — Linear chart —————————————————————————————————————————————

function drawLinear(p, t) {
  const chart = makeChart(LEFT + PAD.l, PY + PAD.t, CW, CH, [0, 100], [0.20, 0.40]);
  chart.drawGrid(0.05, [[0,'0'],[20,'20'],[40,'40'],[60,'60'],[80,'80'],[100,'100']], 'Experiment #');

  const vis = p * 100;  // continuous 0-100

  // Scatter: discarded (fade in as they appear)
  for (const d of LINEAR_DOTS) {
    if (d.e > vis) break;
    if (d.kept) continue;
    const age = (vis - d.e) / 5;  // fade over 5 experiments
    const alpha = Math.min(age, 1) * 0.15;
    circle(chart.x(d.e), chart.y(d.s), 3.5);
    ctx.fillStyle = `rgba(161,161,170,${alpha})`; ctx.fill();
  }

  // Step line (smooth: draw up to fractional experiment)
  const imps = IMPROVEMENTS.filter(([e]) => e <= vis);
  if (imps.length) {
    ctx.beginPath(); ctx.strokeStyle = C.blue; ctx.lineWidth = 2.5;
    imps.forEach(([e, s], i) => {
      const nextE = i < imps.length - 1 ? imps[i + 1][0] : vis;
      i === 0 ? ctx.moveTo(chart.x(e), chart.y(s)) : ctx.lineTo(chart.x(e), chart.y(s));
      ctx.lineTo(chart.x(nextE), chart.y(s));
    });
    ctx.stroke();

    // Kept dots (scale in)
    for (const [e, s] of imps) {
      const age = Math.min((vis - e) / 3, 1);
      const r = lerp(0, 5, ease(age));
      const gr = lerp(0, 10, ease(age));
      if (r > 0.5) {
        circle(chart.x(e), chart.y(s), gr); ctx.fillStyle = `rgba(74,222,128,${0.15 * age})`; ctx.fill();
        circle(chart.x(e), chart.y(s), r);  ctx.fillStyle = C.green; ctx.fill();
      }
    }
  }

  // Plateau zone (fade in)
  if (vis > 70) {
    const fade = Math.min((vis - 70) / 10, 1);
    const px = chart.x(66);
    ctx.save();
    ctx.globalAlpha = fade;
    ctx.setLineDash([5, 5]);
    ctx.strokeStyle = C.red + '0.3)'; ctx.lineWidth = 1;
    line(px, chart.oy, px, chart.oy + chart.h);
    ctx.setLineDash([]);
    ctx.fillStyle = C.red + '0.03)';
    ctx.fillRect(px, chart.oy, chart.x(vis) - px, chart.h);
    if (vis > 75) {
      text('← stuck here', px + 6, chart.oy + 18, { font: '13px Inter', color: C.red + '0.5)' });
      text(Math.round(vis - 66) + ' wasted experiments', px + 6, chart.oy + 36, { font: '13px Inter', color: C.red + '0.5)' });
    }
    ctx.restore();
  }

  const best = imps.length ? imps[imps.length - 1][1] : 0;
  return { best, exp: Math.round(vis), imps: imps.length };
}

// — Tree chart ———————————————————————————————————————————————

function drawTree(p, t) {
  const chart = makeChart(RIGHT + PAD.l, PY + PAD.t, CW, CH, [-0.5, 5.5], [0.20, 0.40]);
  chart.drawGrid(0.05, [0,1,2,3,4,5].map(d => [d, 'd' + d]), 'Depth (branching)');

  // Continuous node count with fractional for smooth appearance
  const nFloat = p * TREE.length;
  const nFull = Math.floor(nFloat);
  const vis = TREE.slice(0, Math.min(nFull + 1, TREE.length));

  // Layout
  const slots = {}, pos = {};
  for (const [id, , depth, score] of vis) {
    const slot = (slots[depth] = (slots[depth] || 0) + 1) - 1;
    pos[id] = [chart.x(depth) + slot * 14, chart.y(score)];
  }

  // Edges (fade in with child node)
  vis.forEach(([id, parent, , score], i) => {
    if (!parent || !pos[parent]) return;
    const [fx, fy] = pos[parent], [tx, ty] = pos[id];
    const age = i < nFull ? 1 : ease(nFloat - nFull);
    const mx = (fx + tx) / 2;
    ctx.beginPath(); ctx.moveTo(fx, fy);
    // Partial curve: interpolate endpoint for smooth growth
    const cx = lerp(fx, tx, age), cy = lerp(fy, ty, age);
    const cmx = (fx + cx) / 2;
    ctx.bezierCurveTo(cmx, fy, cmx, cy, cx, cy);
    ctx.globalAlpha = age;
    ctx.strokeStyle = score > 0.34 ? 'rgba(74,222,128,0.35)' : 'rgba(161,161,170,0.12)';
    ctx.lineWidth = score > 0.34 ? 2 : 1;
    ctx.stroke();
    ctx.globalAlpha = 1;
  });

  // Best tracker
  let best = 0, bestId = null;
  for (const [id, , , s] of vis) if (s > best) { best = s; bestId = id; }

  // Nodes (scale + fade in)
  vis.forEach(([id, , , score], i) => {
    const [x, y] = pos[id];
    const age = i < nFull ? 1 : ease(nFloat - nFull);
    const isBest = id === bestId;

    ctx.save();
    ctx.globalAlpha = age;

    if (isBest && age > 0.5) {
      const g = ctx.createRadialGradient(x, y, 0, x, y, 22);
      g.addColorStop(0, 'rgba(74,222,128,0.35)'); g.addColorStop(1, 'rgba(74,222,128,0)');
      circle(x, y, 22 * age); ctx.fillStyle = g; ctx.fill();
    }

    const r = (isBest ? 7 : 4.5) * age;
    circle(x, y, r);
    ctx.fillStyle = isBest ? C.green : score > 0.34 ? 'rgba(74,222,128,0.6)' : 'rgba(161,161,170,0.3)';
    ctx.fill();

    if ((isBest || score > 0.355) && age > 0.8)
      text(score.toFixed(4), x + 10, y + 4, { font: '12px "JetBrains Mono", monospace', color: isBest ? C.green : 'rgba(74,222,128,0.5)' });

    ctx.restore();
  });

  // UCB annotation
  if (nFull > 6) {
    const fade = Math.min((nFull - 6) / 3, 1);
    ctx.save(); ctx.globalAlpha = fade;
    text('UCB balances explore ↔ exploit', chart.ox + 4, chart.oy + 14, { font: '12px Inter', color: 'rgba(96,165,250,0.4)' });
    ctx.restore();
  }

  // Linear plateau reference (fades in after tree completes)
  if (p >= 1) {
    const fade = Math.min((t - TREE_END) / 0.05, 1);
    ctx.save(); ctx.globalAlpha = Math.max(0, fade);
    ctx.setLineDash([5, 5]);
    ctx.strokeStyle = C.red + '0.25)'; ctx.lineWidth = 1;
    line(chart.ox, chart.y(0.3632), chart.ox + chart.w, chart.y(0.3632));
    ctx.setLineDash([]);
    text('linear plateau: 0.3632', chart.ox + chart.w, chart.y(0.3632) - 6, { font: '11px Inter', color: C.red + '0.5)', align: 'right' });
    ctx.restore();
  }

  const branches = new Set(vis.filter(([,p2]) => p2).map(([,p2]) => p2)).size;
  return { best, nodes: Math.min(nFull + 1, TREE.length), branches };
}

// — Shared components ————————————————————————————————————————

function drawBadge(x, y, label, color, bg) {
  ctx.font = '500 12px "JetBrains Mono", monospace';
  const w = ctx.measureText(label).width + 16;
  ctx.fillStyle = bg; roundRect(x, y, w, 24, 5); ctx.fill();
  text(label, x + 8, y + 16, { color });
}

function drawTimer(x, y, timeStr, done) {
  const color = done ? 'rgba(161,161,170,0.3)' : 'rgba(96,165,250,0.5)';
  const icon = done ? '⏱' : '⏱';
  text(icon + ' ' + timeStr, x, y, { font: '500 13px "JetBrains Mono", monospace', color });
}

function formatTime(minutes) {
  if (minutes < 1) return Math.round(minutes * 60) + 's';
  const m = Math.floor(minutes);
  const s = Math.round((minutes - m) * 60);
  return m + 'm ' + (s < 10 ? '0' : '') + s + 's';
}

function drawStatRow(px, y, stats) {
  const w = PW / 3;
  stats.forEach(([val, label, color], i) => {
    const cx = px + w * i + w / 2;
    text(val, cx, y + 8, { font: '700 26px "JetBrains Mono", monospace', color, align: 'center' });
    text(label, cx, y + 26, { font: '500 10px Inter', color: C.muted, align: 'center' });
  });
}

function drawLegend(cx, y) {
  [[C.green, 'Kept improvement'], ['rgba(161,161,170,0.3)', 'Discarded'], [C.blue, 'Running best']].forEach(([c, l], i) => {
    const x = cx - 240 + i * 160;
    circle(x + 6, y, 5); ctx.fillStyle = c; ctx.fill();
    text(l, x + 16, y + 4, { font: '12px Inter', color: C.muted });
  });
}

// — API for capture script ———————————————————————————————————
// renderFrame takes normalized t (0..1)
window.renderFrame = renderFrame;
renderFrame(0);

</script>
</body>
</html>
